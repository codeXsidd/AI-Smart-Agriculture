<!DOCTYPE html>
<html>
<head>
    <title>Early Risk Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html">After Infection</a>
    <a href="risk.html">Before Infection</a>
</nav>

<div class="container">
    <h1>🌦 Early Disease Risk</h1>

    <div class="card">
        <h2>Manual ML Mode</h2>

        <select id="crop">
            <option>Tomato</option>
            <option>Potato</option>
            <option>Carrot</option>
            <option>Rice</option>
            <option>Wheat</option>
        </select>

        <input type="number" id="temp" placeholder="Temperature">
        <input type="number" id="humidity" placeholder="Humidity">
        <input type="number" id="rainfall" placeholder="Rainfall">

        <button onclick="predictRisk()">Predict Risk</button>

        <div id="riskResult" class="result-box"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
