<!DOCTYPE html>
<html>
<head>
  <title>AgriVision - History</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🌿 AgriVision</div>
  <a href="index.html" class="nav-item">After Infection</a>
  <a href="before.html" class="nav-item">Before Infection</a>
  <a href="history.html" class="nav-item active">History</a>
</div>

<div class="main">
  <h1>Prediction History</h1>
  <div id="historyList"></div>
</div>

<script>
  const history = JSON.parse(localStorage.getItem("agriHistory")) || [];
  const container = document.getElementById("historyList");

  if (history.length === 0) {
    container.innerHTML = "<p>No history available.</p>";
  } else {
    history.reverse().forEach(item => {
      container.innerHTML += `
        <div class="result-card">
          <h3>${item.type} Prediction</h3>
          <p><b>Date:</b> ${item.date}</p>
          <pre>${JSON.stringify(item.result, null, 2)}</pre>
        </div>
      `;
    });
  }
</script>

</body>
</html>
