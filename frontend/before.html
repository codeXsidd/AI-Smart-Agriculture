<!DOCTYPE html>
<html>
<head>
  <title>AgriVision - Before Infection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🌿 AgriVision</div>
  <a href="index.html" class="nav-item">After Infection</a>
  <a href="before.html" class="nav-item active">Before Infection</a>
  <a href="history.html" class="nav-item">History</a>
</div>

<div class="main">
  <h1>Early Risk Prediction</h1>

  <div class="card">

    <!-- Crop Dropdown -->
    <label>Select Crop</label>
    <select id="crop">
      <option>Loading crops...</option>
    </select>

    <br><br>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button onclick="setManualMode()" id="manualBtn" class="active-mode">
        Manual
      </button>
      <button onclick="setAutoMode()" id="autoBtn">
        Auto (Weather API)
      </button>
    </div>

    <br>

    <!-- MANUAL INPUTS -->
    <div id="manualSection">
      <input type="number" id="temp" placeholder="Temperature (°C)">
      <input type="number" id="humidity" placeholder="Humidity (%)">
      <input type="number" id="rainfall" placeholder="Rainfall (mm)">
    </div>

    <!-- AUTO WEATHER -->
    <div id="autoSection" style="display:none;">
      <input type="text" id="city" placeholder="Enter City Name">
      <button onclick="getWeather()">Fetch Weather</button>
      <p id="weatherInfo"></p>
    </div>

    <br>

    <button onclick="predictRisk()">Forecast Risk</button>

    <div id="riskResult"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
