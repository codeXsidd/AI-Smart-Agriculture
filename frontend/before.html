<!DOCTYPE html>
<html>
<head>
  <title>AgriVision - Before Infection</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🌿 AgriVision</div>
  <a href="index.html" class="nav-item">After Infection</a>
  <a href="before.html" class="nav-item active">Before Infection</a>
  <a href="history.html" class="nav-item">History</a>
</div>

<div class="main">
  <h1>Early Risk Prediction</h1>

  <div class="card">

    <!-- Dynamic Crop Dropdown (Loaded from /risk_crops/) -->
    <label>Select Crop</label>
<select id="beforeCrop">
  <option>Loading crops...</option>
</select>

    <br><br>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button 
        onclick="setManualMode()" 
        id="manualBtn" 
        class="active-mode">
        Manual
      </button>

      <button 
        onclick="setAutoMode()" 
        id="autoBtn">
        Auto (Weather API)
      </button>
    </div>

    <br>

    <!-- MANUAL INPUTS -->
    <div id="manualSection">
      <input 
        type="number" 
        id="temp" 
        placeholder="Temperature (°C)" 
        step="0.1"
      >
      <input 
        type="number" 
        id="humidity" 
        placeholder="Humidity (%)"
        step="0.1"
      >
      <input 
        type="number" 
        id="rainfall" 
        placeholder="Rainfall (mm)"
        step="0.1"
      >
    </div>

    <!-- AUTO WEATHER SECTION -->
    <div id="autoSection" style="display:none;">
      
      <button onclick="getCurrentLocationWeather()">
        Use My Current Location
      </button>

      <p id="weatherInfo" style="margin-top:10px;"></p>

    </div>

    <br>

    <button onclick="predictRisk()">
      Forecast Risk
    </button>

    <br><br>

    <div id="riskResult"></div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
