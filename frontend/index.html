<!DOCTYPE html>
<html>
<head>
  <title>AgriVision - After Infection</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🌿 AgriVision</div>
  <a href="index.html" class="nav-item active">After Infection</a>
  <a href="before.html" class="nav-item">Before Infection</a>
  <a href="history.html" class="nav-item">History</a>
</div>

<div class="main">
  <h1>Disease Diagnosis</h1>

  <div class="card">

    <!-- Upload Section -->
    <label>Upload Leaf Image</label>
    <div class="upload-box">
      <input 
        type="file" 
        id="imageInput" 
        accept="image/*" 
        onchange="previewImage(event)"
      >

      <div class="preview-container">
        <img 
          id="imagePreview" 
          alt="Leaf Preview"
          style="display:none; max-width:200px; margin-top:10px;"
        >
      </div>
    </div>

    <br>

    <!-- Crop Dropdown -->
    <label>Select Crop</label>
    <select id="afterCrop">
      <option>Loading crops...</option>
    </select>

    <br><br>

    <!-- Analyze Button -->
    <button onclick="predictDisease()">
      Analyze Plant Health
    </button>

    <br><br>

    <!-- Result -->
    <div id="diseaseResult"></div>

  </div>
</div>

<script src="script.js"></script>
<script>
  loadAfterCrops();   // Load crop list from backend
</script>

</body>
</html>
