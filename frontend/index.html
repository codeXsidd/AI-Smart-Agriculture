<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Agriculture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌿 AI Smart Agriculture</h1>
    <p>Smart Disease Detection & Early Risk Prediction System</p>
</header>

<div class="container">

    <!-- SECTION 1 -->
    <div class="card">
        <h2>After Infection – Disease Detection</h2>

        <select id="plantSelect">
            <option value="Tomato">Tomato</option>
            <option value="Potato">Potato</option>
            <option value="Corn">Corn</option>
            <option value="Apple">Apple</option>
            <option value="Grape">Grape</option>
            <option value="Pepper">Pepper</option>
            <option value="Strawberry">Strawberry</option>
            <option value="Carrot">Carrot</option>
            <option value="Cabbage">Cabbage</option>
            <option value="Onion">Onion</option>
            <option value="Wheat">Wheat</option>
            <option value="Rice">Rice</option>
            <option value="Soybean">Soybean</option>
            <option value="Banana">Banana</option>
            <option value="Mango">Mango</option>
        </select>

        <input type="file" id="imageInput">
        <button onclick="uploadImage()">Predict Disease</button>

        <div id="diseaseResult" class="result-box"></div>
    </div>

    <!-- SECTION 2 -->
    <div class="card">
        <h2>Before Infection – Early Risk Prediction</h2>

        <select id="crop">
            <option value="Tomato">Tomato</option>
            <option value="Potato">Potato</option>
            <option value="Corn">Corn</option>
            <option value="Rice">Rice</option>
            <option value="Wheat">Wheat</option>
        </select>

        <input type="number" id="temp" placeholder="Temperature (°C)">
        <input type="number" id="humidity" placeholder="Humidity (%)">
        <input type="number" id="rainfall" placeholder="Rainfall (mm)">

        <button onclick="predictRisk()">Predict Risk</button>

        <div id="riskResult" class="result-box"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
