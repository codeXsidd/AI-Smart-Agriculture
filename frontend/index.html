<!DOCTYPE html>
<html>
<head>
  <title>AgriVision - After Infection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🌿 AgriVision</div>
  <a href="index.html" class="nav-item active">After Infection</a>
  <a href="before.html" class="nav-item">Before Infection</a>
  <a href="history.html" class="nav-item">History</a>
</div>

<div class="main">
  <h1>Disease Diagnosis</h1>

  <div class="card">

    <!-- Image Upload -->
    <label>Upload Leaf Image</label>
    <div class="upload-box">
      <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
      
      <div class="preview-container">
        <img id="imagePreview" src="" alt="Image Preview" style="display:none;">
      </div>
    </div>

    <br>

    <!-- Dynamic Crop Dropdown -->
    <label>Select Crop</label>
    <select id="crop">
      <option>Loading crops...</option>
    </select>

    <br><br>

    <button onclick="predictDisease()">Analyze Plant Health</button>

    <div id="diseaseResult"></div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
