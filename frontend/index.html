<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Agriculture</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌿 AI Smart Agriculture</h1>

    <!-- SECTION 1 -->
    <div class="card">
        <h2>Disease Detection</h2>
        <input type="file" id="imageInput">
        <button onclick="uploadImage()">Predict Disease</button>
        <div id="diseaseResult" class="result-box"></div>
    </div>

    <!-- SECTION 2 -->
    <div class="card">
        <h2>Early Disease Risk</h2>
        <input type="text" id="crop" placeholder="Crop Name">
        <input type="number" id="temp" placeholder="Temperature">
        <input type="number" id="humidity" placeholder="Humidity">
        <input type="number" id="rainfall" placeholder="Rainfall">
        <button onclick="predictRisk()">Predict Risk</button>
        <div id="riskResult" class="result-box"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
