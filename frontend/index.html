<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Agriculture 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>🌿 AI Smart Agriculture 2.0</h2>
    <div>
        <button onclick="showPage('disease')">Disease Detection</button>
        <button onclick="showPage('risk')">Risk Prediction</button>
    </div>
</nav>

<div class="page" id="diseasePage">
    <div class="card">
        <h2>Plant Disease Detection</h2>
        <input type="file" id="imageInput">
        <button onclick="uploadImage()">Predict Disease</button>
        <div id="diseaseResult" class="result-box"></div>
    </div>
</div>

<div class="page hidden" id="riskPage">
    <div class="card">
        <h2>Early Disease Risk Prediction</h2>
        <input type="text" id="crop" placeholder="Crop Name">
        <input type="number" id="temp" placeholder="Temperature">
        <input type="number" id="humidity" placeholder="Humidity">
        <input type="number" id="rainfall" placeholder="Rainfall">
        <button onclick="predictRisk()">Predict Risk</button>
        <div id="riskResult" class="result-box"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
